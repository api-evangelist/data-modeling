aid: data-modeling
name: Data Modeling
description: >-
  Data Modeling is the discipline of designing structured representations
  of data to organize information, define relationships, and govern how
  data is stored, accessed, and managed. It spans conceptual, logical, and
  physical models across relational, dimensional, NoSQL, graph, and data
  vault paradigms, supported by standards and tools from the OMG, DAMA,
  Erwin, PowerDesigner, dbt, and modern data modeling platforms.
